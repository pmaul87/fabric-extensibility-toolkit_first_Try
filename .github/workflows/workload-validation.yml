name: Workload Validation

on:
  pull_request:
    paths:
      - 'Workload/**'
      - '.github/workflows/workload-validation.yml'
  workflow_dispatch:

jobs:
  validate-workload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Workload

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Workload/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build test package
        run: npm run build:test